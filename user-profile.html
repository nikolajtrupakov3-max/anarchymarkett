<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя | AnarchyMarket</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-wrapper {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .profile-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #ff4444;
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
        }
        .profile-name {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ff4444;
        }
        .profile-joined {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .stat-box {
    text-align: center;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    min-width: 120px;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}
.stat-box:hover {
    transform: scale(1.05);
    background: rgba(255,68,68,0.2);
}
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        .reviews-section {
            margin-top: 30px;
        }
        .reviews-section h3 {
            color: #ff4444;
            margin-bottom: 15px;
        }
        .review-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }
        .review-rating {
            color: #ffd700;
            margin-bottom: 5px;
        }
        .review-comment {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .review-date {
            color: #888;
            font-size: 11px;
        }
        .no-reviews {
            color: #aaa;
            text-align: center;
            padding: 30px;
        }
        .back-button {
            text-align: center;
            margin-top: 30px;
        }
        .back-link {
            color: #ff4444;
            text-decoration: none;
        }
        .rating-stars {
            display: inline-flex;
            gap: 2px;
        }
        .star-filled {
            color: #ffd700;
        }
        .star-empty {
            color: #555;
        }
        .error-message {
            text-align: center;
            color: #ff4444;
            padding: 50px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">
            <img src="images/logo.png" alt="AnarchyMarket" class="logo-img">
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="about.html">О проекте</a>
            <a href="#">Поддержка</a>
        </div>
        <div class="auth-buttons" id="authButtons">
            <a href="login.html" class="login-btn">Вход</a>
            <a href="register.html" class="register-btn">Регистрация</a>
        </div>
        <div class="user-profile" id="userProfile" style="display: none;">
            <div class="user-avatar" id="userAvatar">👤</div>
            <div class="user-dropdown" id="userDropdown">
                <a href="profile.html" class="dropdown-item">👤 Мой профиль</a>
                <a href="my-offers.html" class="dropdown-item">📦 Мои объявления</a>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" id="logoutBtn">🚪 Выйти</div>
            </div>
        </div>
    </div>

    <div class="profile-wrapper">
        <div class="profile-card" id="profileCard">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <h1 class="profile-name" id="profileName">Загрузка...</h1>
            <div class="profile-joined" id="profileJoined"></div>
            
            <div class="stats-grid">
               <div class="stat-box" style="cursor: pointer;" onclick="window.location.href='user-offers.html?id=' + userId">
    <div class="stat-value" id="activeOffers">0</div>
    <div class="stat-label">Активных товаров</div>
</div>
                <div class="stat-box">
                    <div class="stat-value" id="soldOffers">0</div>
                    <div class="stat-label">Продано</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="reviewsCount">0</div>
                    <div class="stat-label">Отзывов</div>
                </div>
            </div>
            
            <div class="reviews-section">
                <h3>⭐ Отзывы о пользователе</h3>
                <div id="reviewsList">
                    <div class="no-reviews">Загрузка отзывов...</div>
                </div>
            </div>
        </div>
        
        <div class="back-button">
            <a href="javascript:history.back()" class="back-link">← Назад</a>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        
        if (!userId) {
            window.location.href = 'index.html';
        }
        
        function renderStars(rating) {
            const fullStars = Math.floor(rating);
            let starsHtml = '';
            for (let i = 0; i < fullStars; i++) {
                starsHtml += '<span class="star-filled">★</span>';
            }
            for (let i = fullStars; i < 5; i++) {
                starsHtml += '<span class="star-empty">★</span>';
            }
            return starsHtml;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function loadUserProfile() {
            try {
                // 1. Получаем ник из таблицы profiles
                const { data: profileData, error: profileError } = await supabase
                    .from('profiles')
                    .select('username, created_at')
                    .eq('id', userId)
                    .maybeSingle();
                
                if (profileError) {
                    console.error('Ошибка профиля:', profileError);
                    document.getElementById('profileName').textContent = 'Ошибка загрузки';
                    return;
                }
                
                if (!profileData) {
                    document.getElementById('profileName').textContent = 'Пользователь не найден';
                    return;
                }
                
                const username = profileData.username || 'Пользователь';
                document.getElementById('profileName').textContent = username;
                
                const avatarLetter = (username[0] || 'U').toUpperCase();
                document.getElementById('profileAvatar').textContent = avatarLetter;
                
                // Дата регистрации
                if (profileData.created_at) {
                    const createdDate = new Date(profileData.created_at);
                    document.getElementById('profileJoined').textContent = `На сайте с ${createdDate.toLocaleDateString('ru-RU')}`;
                } else {
                    document.getElementById('profileJoined').textContent = 'На сайте';
                }
                
                // 2. Статистика из offers
                const { data: offers } = await supabase
                    .from('offers')
                    .select('*')
                    .eq('user_id', userId);
                
                const activeOffers = offers?.filter(o => o.status === 'active') || [];
                const soldOffers = offers?.filter(o => o.status === 'sold') || [];
                
                document.getElementById('activeOffers').textContent = activeOffers.length;
                document.getElementById('soldOffers').textContent = soldOffers.length;
                
                // 3. Отзывы
                const { data: reviews } = await supabase
                    .from('reviews')
                    .select('*')
                    .eq('seller_id', userId)
                    .order('created_at', { ascending: false });
                
                document.getElementById('reviewsCount').textContent = reviews?.length || 0;
                
                const reviewsList = document.getElementById('reviewsList');
                
                if (!reviews || reviews.length === 0) {
                    reviewsList.innerHTML = '<div class="no-reviews">😊 У этого пользователя пока нет отзывов</div>';
                    return;
                }
                
                reviewsList.innerHTML = '';
                
                for (const review of reviews) {
                    const { data: buyerProfile } = await supabase
                        .from('profiles')
                        .select('username')
                        .eq('id', review.buyer_id)
                        .maybeSingle();
                    
                    const buyerName = buyerProfile?.username || 'Покупатель';
                    
                    const reviewCard = document.createElement('div');
                    reviewCard.className = 'review-card';
                    reviewCard.innerHTML = `
                        <div class="review-rating">${renderStars(review.rating)}</div>
                        <div class="review-comment">${escapeHtml(review.comment || 'Без комментария')}</div>
                        <div class="review-date">👤 ${escapeHtml(buyerName)} • ${new Date(review.created_at).toLocaleDateString('ru-RU')}</div>
                    `;
                    reviewsList.appendChild(reviewCard);
                }
                
            } catch (err) {
                console.error('Ошибка:', err);
                document.getElementById('profileName').textContent = 'Ошибка загрузки';
            }
        }
        
        loadUserProfile();
                // Клик по блоку "Активных товаров"
        const activeOffersBox = document.querySelector('.stat-box');
        if (activeOffersBox) {
            activeOffersBox.style.cursor = 'pointer';
            activeOffersBox.onclick = () => {
                window.location.href = `user-offers.html?id=${userId}`;
            };
        }
        
        // === АВАТАРКА В ШАПКЕ ===
        async function updateUI() {
            const { data: { user } } = await supabase.auth.getUser();
            const authBtns = document.getElementById('authButtons');
            const userProf = document.getElementById('userProfile');
            const userAv = document.getElementById('userAvatar');
            
            if (user) {
                if (authBtns) authBtns.style.display = 'none';
                if (userProf) {
                    userProf.style.display = 'flex';
                    if (userAv) {
                        const letter = (user.user_metadata?.username?.[0] || user.email?.[0] || 'U').toUpperCase();
                        userAv.textContent = letter;
                    }
                }
            } else {
                if (authBtns) authBtns.style.display = 'flex';
                if (userProf) userProf.style.display = 'none';
            }
        }
        
        updateUI();
        
        const userAvatar = document.getElementById('userAvatar');
        const userDropdown = document.getElementById('userDropdown');
        
        if (userAvatar && userDropdown) {
            userAvatar.addEventListener('click', (e) => {
                e.stopPropagation();
                userDropdown.classList.toggle('show');
            });
            document.addEventListener('click', () => {
                userDropdown.classList.remove('show');
            });
        }
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
